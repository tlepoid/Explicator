<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explicator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      background: #f3f4f6;
      display: flex;
      height: 100vh;
      overflow: hidden;
      color: #111827;
    }

    /* ── Sidebar ─────────────────────────────────────────────────── */
    #sidebar {
      width: 256px;
      min-width: 256px;
      background: #1e1e2e;
      color: #cdd6f4;
      display: flex;
      flex-direction: column;
      padding: 20px 14px;
      overflow-y: auto;
      gap: 20px;
    }

    .sidebar-logo {
      font-size: 18px;
      font-weight: 700;
      color: #cba6f7;
      letter-spacing: -0.3px;
    }

    .sidebar-model-name {
      font-size: 12px;
      font-weight: 600;
      color: #a6e3a1;
      margin-bottom: 2px;
    }

    .sidebar-model-desc {
      font-size: 11px;
      color: #6c7086;
      line-height: 1.4;
    }

    .sidebar-section {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .sidebar-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #45475a;
      margin-bottom: 4px;
    }

    .scenario-btn {
      display: block;
      width: 100%;
      text-align: left;
      background: none;
      border: none;
      border-radius: 6px;
      padding: 7px 10px;
      color: #cdd6f4;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.1s;
    }
    .scenario-btn:hover { background: #313244; }
    .scenario-btn .s-name {
      font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
      font-size: 11px;
      font-weight: 600;
      color: #89b4fa;
    }
    .scenario-btn .s-desc {
      font-size: 11px;
      color: #585b70;
      margin-top: 1px;
      line-height: 1.3;
    }

    .override-item {
      font-size: 11px;
      color: #fab387;
      font-family: "SF Mono", "Fira Code", monospace;
      padding: 2px 0;
    }
    .no-overrides { font-size: 11px; color: #45475a; }

    #reset-btn {
      background: #313244;
      color: #f38ba8;
      border: none;
      border-radius: 6px;
      padding: 7px 12px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      width: 100%;
      transition: background 0.15s;
      margin-top: 4px;
    }
    #reset-btn:hover { background: #45475a; }

    /* ── Main ────────────────────────────────────────────────────── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #topbar {
      background: #fff;
      border-bottom: 1px solid #e5e7eb;
      padding: 0 20px;
      height: 48px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    #topbar-title {
      font-size: 13px;
      font-weight: 600;
      color: #6b7280;
    }
    #topbar-model {
      font-size: 13px;
      font-weight: 600;
      color: #111827;
    }

    /* ── Messages ────────────────────────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 24px 8px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    #empty-state {
      margin: auto;
      text-align: center;
      color: #9ca3af;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 40px;
    }
    #empty-state svg { opacity: 0.3; }
    #empty-state h3 { font-size: 16px; font-weight: 600; color: #6b7280; }
    #empty-state p  { font-size: 13px; max-width: 320px; line-height: 1.5; }

    /* User bubble */
    .user-bubble {
      align-self: flex-end;
      background: #4f46e5;
      color: #fff;
      border-radius: 14px 14px 3px 14px;
      padding: 10px 14px;
      max-width: 72%;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }

    /* AI turn wrapper */
    .ai-turn {
      align-self: flex-start;
      width: 100%;
      max-width: 760px;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    /* Thinking dots */
    .thinking {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 2px;
      color: #9ca3af;
      font-size: 13px;
    }
    .dots { display: flex; gap: 5px; }
    .dot {
      width: 7px; height: 7px;
      background: #d1d5db;
      border-radius: 50%;
      animation: pulse 1.4s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40%           { transform: scale(1);   opacity: 1; }
    }

    /* ── Trace card ──────────────────────────────────────────────── */
    /* Inspired by Playwright's action list: each step is a distinct card. */
    .trace-card {
      border-radius: 7px;
      border: 1px solid #e5e7eb;
      overflow: hidden;
      animation: appear 0.18s ease-out;
    }
    @keyframes appear {
      from { opacity: 0; transform: translateY(-3px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .trace-card.tool-call   { border-left: 3px solid #8b5cf6; background: #faf5ff; }
    .trace-card.tool-result { border-left: 3px solid #22c55e; background: #f0fdf4; }
    .trace-card.err         { border-left: 3px solid #ef4444; background: #fef2f2; }

    .trace-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      cursor: pointer;
      user-select: none;
    }
    .trace-header:hover { filter: brightness(0.97); }

    .trace-icon { font-size: 13px; flex-shrink: 0; }
    .trace-name {
      font-size: 12px;
      font-weight: 600;
      font-family: "SF Mono", "Fira Code", monospace;
      flex-shrink: 0;
    }
    .tool-call   .trace-name { color: #7c3aed; }
    .tool-result .trace-name { color: #15803d; }
    .err         .trace-name { color: #b91c1c; }

    .trace-args {
      flex: 1;
      font-size: 11px;
      font-family: "SF Mono", "Fira Code", monospace;
      color: #6b7280;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .trace-toggle {
      font-size: 10px;
      color: #9ca3af;
      flex-shrink: 0;
      transition: transform 0.18s;
    }
    .trace-toggle.open { transform: rotate(90deg); }

    .trace-body {
      display: none;
      padding: 0 12px 10px;
      border-top: 1px solid rgba(0,0,0,0.06);
    }
    .trace-body.open { display: block; }
    .trace-body pre {
      font-family: "SF Mono", "Fira Code", monospace;
      font-size: 11px;
      color: #374151;
      background: rgba(255,255,255,0.55);
      border-radius: 5px;
      padding: 8px 10px;
      margin-top: 8px;
      overflow-x: auto;
      white-space: pre;
      max-height: 320px;
      overflow-y: auto;
    }

    /* ── Assistant answer ────────────────────────────────────────── */
    .assistant-answer {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 7px;
      padding: 14px 16px;
      font-size: 14px;
      line-height: 1.65;
      color: #1f2937;
      white-space: pre-wrap;
      word-break: break-word;
      animation: appear 0.18s ease-out;
    }

    /* ── Input bar ───────────────────────────────────────────────── */
    #input-bar {
      background: #fff;
      border-top: 1px solid #e5e7eb;
      padding: 14px 20px;
      display: flex;
      gap: 10px;
      flex-shrink: 0;
    }

    #chat-input {
      flex: 1;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      resize: none;
      height: 42px;
      line-height: 1.4;
    }
    #chat-input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }

    #send-btn {
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
      height: 42px;
    }
    #send-btn:hover:not(:disabled) { background: #4f46e5; }
    #send-btn:disabled { background: #a5b4fc; cursor: not-allowed; }
  </style>
</head>
<body>

<!-- ── Sidebar ─────────────────────────────────────────────────────── -->
<div id="sidebar">
  <div>
    <div class="sidebar-logo">Explicator</div>
  </div>

  <div class="sidebar-section" id="model-info">
    <div class="sidebar-model-name" id="model-name">Loading…</div>
    <div class="sidebar-model-desc" id="model-desc"></div>
  </div>

  <div class="sidebar-section">
    <div class="sidebar-label">Scenarios</div>
    <div id="scenario-list"></div>
  </div>

  <div class="sidebar-section" style="margin-top:auto;">
    <div class="sidebar-label">Active Overrides</div>
    <div id="override-list"><span class="no-overrides">None</span></div>
    <button id="reset-btn" onclick="resetOverrides()">↺ Reset overrides</button>
  </div>
</div>

<!-- ── Main ────────────────────────────────────────────────────────── -->
<div id="main">
  <div id="topbar">
    <span id="topbar-title">Chat with</span>
    <span id="topbar-model">…</span>
  </div>

  <div id="messages">
    <div id="empty-state">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="1.5">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <h3>Ask anything about the model</h3>
      <p>Type a question below, or click a scenario on the left to run it and ask for an explanation.</p>
    </div>
  </div>

  <div id="input-bar">
    <input id="chat-input" type="text" placeholder="Ask about the model…" />
    <button id="send-btn" onclick="send()">Send</button>
  </div>
</div>

<script>
  // ── State ────────────────────────────────────────────────────────
  const history = [];   // [{role, content}] — user + assistant only
  let streaming = false;

  // ── Bootstrap ────────────────────────────────────────────────────
  (async function init() {
    try {
      const [schemaRes, scenariosRes] = await Promise.all([
        fetch("/api/schema"),
        fetch("/api/scenarios"),
      ]);
      const schema    = await schemaRes.json();
      const scenarios = await scenariosRes.json();

      document.getElementById("model-name").textContent    = schema.name ?? "Model";
      document.getElementById("topbar-model").textContent  = schema.name ?? "Model";
      document.getElementById("model-desc").textContent    = schema.description ?? "";

      const list = document.getElementById("scenario-list");
      list.innerHTML = "";
      for (const s of scenarios) {
        const btn = document.createElement("button");
        btn.className = "scenario-btn";
        btn.innerHTML = `
          <div class="s-name">${esc(s.name)}</div>
          <div class="s-desc">${esc(s.description)}</div>
        `;
        btn.onclick = () => prefill(`Run the ${s.name} scenario and explain the results.`);
        list.appendChild(btn);
      }
    } catch (e) {
      console.error("init failed", e);
    }
  })();

  // ── Send ─────────────────────────────────────────────────────────
  async function send() {
    if (streaming) return;
    const input = document.getElementById("chat-input");
    const text  = input.value.trim();
    if (!text) return;

    input.value = "";
    streaming   = true;
    document.getElementById("send-btn").disabled = true;

    // Clear empty state on first message
    const empty = document.getElementById("empty-state");
    if (empty) empty.remove();

    appendUserBubble(text);
    history.push({ role: "user", content: text });

    const turn = document.createElement("div");
    turn.className = "ai-turn";
    document.getElementById("messages").appendChild(turn);

    let thinking = null;

    try {
      const res = await fetch("/api/chat/stream", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ messages: history }),
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const reader  = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buf += decoder.decode(value, { stream: true });
        const lines = buf.split("\n");
        buf = lines.pop();   // keep any incomplete line

        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const ev = JSON.parse(line.slice(6));

          if (ev.type === "thinking") {
            if (!thinking) thinking = appendThinking(turn);

          } else if (ev.type === "tool_call") {
            if (thinking) { thinking.remove(); thinking = null; }
            appendToolCall(turn, ev.name, ev.arguments);

          } else if (ev.type === "tool_result") {
            appendToolResult(turn, ev.name, ev.result);

          } else if (ev.type === "assistant_text") {
            if (thinking) { thinking.remove(); thinking = null; }
            appendAnswer(turn, ev.content);
            history.push({ role: "assistant", content: ev.content });
            await refreshOverrides();

          } else if (ev.type === "error") {
            if (thinking) { thinking.remove(); thinking = null; }
            appendError(turn, ev.message);
          }
        }
      }
    } catch (e) {
      if (thinking) { thinking.remove(); thinking = null; }
      appendError(turn, e.message);
    }

    streaming = false;
    document.getElementById("send-btn").disabled = false;
    document.getElementById("chat-input").focus();
  }

  // ── DOM helpers ──────────────────────────────────────────────────
  function appendUserBubble(text) {
    const el = document.createElement("div");
    el.className   = "user-bubble";
    el.textContent = text;
    messages().appendChild(el);
    scrollBottom();
  }

  function appendThinking(turn) {
    const el = document.createElement("div");
    el.className = "thinking";
    el.innerHTML = `
      <div class="dots">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
      </div>
      <span>Claude is thinking…</span>
    `;
    turn.appendChild(el);
    scrollBottom();
    return el;
  }

  function appendToolCall(turn, name, args) {
    const summary = callSummary(name, args);
    turn.appendChild(traceCard("tool-call", "⚙", name, summary, args));
    scrollBottom();
  }

  function appendToolResult(turn, name, result) {
    turn.appendChild(traceCard("tool-result", "✓", `${name} → result`, "", result));
    scrollBottom();
  }

  function appendAnswer(turn, text) {
    const el = document.createElement("div");
    el.className   = "assistant-answer";
    el.textContent = text;
    turn.appendChild(el);
    scrollBottom();
  }

  function appendError(turn, msg) {
    turn.appendChild(traceCard("err", "✗", "Error", msg, null));
    scrollBottom();
  }

  // Build a collapsible trace card (Playwright-style step)
  function traceCard(cls, icon, name, summary, data) {
    const card = document.createElement("div");
    card.className = `trace-card ${cls}`;

    const hdr = document.createElement("div");
    hdr.className = "trace-header";
    hdr.innerHTML = `
      <span class="trace-icon">${icon}</span>
      <span class="trace-name">${esc(name)}</span>
      ${summary ? `<span class="trace-args">${esc(summary)}</span>` : ""}
      ${data !== null ? '<span class="trace-toggle">▶</span>' : ""}
    `;
    card.appendChild(hdr);

    if (data !== null) {
      const body = document.createElement("div");
      body.className = "trace-body";
      const pre = document.createElement("pre");
      pre.textContent = JSON.stringify(data, null, 2);
      body.appendChild(pre);
      card.appendChild(body);

      hdr.onclick = () => {
        body.classList.toggle("open");
        hdr.querySelector(".trace-toggle").classList.toggle("open");
      };
    }

    return card;
  }

  // ── Overrides ────────────────────────────────────────────────────
  async function refreshOverrides() {
    try {
      const res = await fetch("/api/overrides");
      const list = await res.json();
      const el = document.getElementById("override-list");
      if (!list.length) {
        el.innerHTML = '<span class="no-overrides">None</span>';
      } else {
        el.innerHTML = list
          .map(o => `<div class="override-item">${esc(o.source)}.${esc(o.field)} = ${esc(String(o.value))}</div>`)
          .join("");
      }
    } catch (e) { /* best-effort */ }
  }

  async function resetOverrides() {
    await fetch("/api/reset", { method: "POST" });
    await refreshOverrides();
  }

  // ── Utils ─────────────────────────────────────────────────────────
  function callSummary(name, args) {
    const a = args ?? {};
    switch (name) {
      case "run_scenario":          return `("${a.name ?? ""}")`;
      case "compare_scenarios":     return `("${a.scenario_a ?? ""}", "${a.scenario_b ?? ""}")`;
      case "override_input":        return `(${a.source ?? ""}.${a.field ?? ""} = ${a.value ?? ""})`;
      case "get_available_scenarios": return "()";
      case "reset_overrides":       return "()";
      default:                      return "";
    }
  }

  function prefill(text) {
    document.getElementById("chat-input").value = text;
    document.getElementById("chat-input").focus();
  }

  function messages() { return document.getElementById("messages"); }
  function scrollBottom() {
    const m = messages();
    m.scrollTop = m.scrollHeight;
  }

  function esc(s) {
    return String(s ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  // ── Keyboard ─────────────────────────────────────────────────────
  document.getElementById("chat-input").addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });
</script>
</body>
</html>
